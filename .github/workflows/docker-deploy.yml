name: Deploy via SSH

on:
  # Triggers after the build-and-push workflow completes successfully
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed
    branches:
      - docker-compose

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    environment: production

    # Only deploy if the triggering workflow succeeded (skip if it failed)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Create Docker context pointing to remote host
        run: |
          docker context create remote \
            --docker "host=ssh://${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_PORT || 22 }},key=/root/.ssh/deploy_key"
          docker context use remote

      - name: Log in to Docker Hub (on remote daemon)
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pull latest images and deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REACT_APP_BACKEND_API: ${{ vars.REACT_APP_BACKEND_API }}
          PORT: ${{ vars.PORT }}
        run: |
          echo "==> Pulling latest Docker images on remote host..."
          docker compose pull

          echo "==> Restarting services..."
          docker compose up -d --remove-orphans

          echo "==> Cleaning up old images..."
          docker image prune -f

          echo "==> Deployment complete!"
          docker compose ps
