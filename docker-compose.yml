
services:
  # Reverse Proxy (entry point for users)
  reverse-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/reverse-proxy.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-server
      - load-balancer
    networks:
      - frontend-network
    restart: always

  # Web Server with Cache (serves frontend content)
  # Assuming the frontend is built and the build output is in the web-frontend/build directory
  web-server:
    image: nginx:alpine
    volumes:
      - ./nginx/web-server.conf:/etc/nginx/nginx.conf:ro
      - ./web-frontend/build:/usr/share/nginx/html
      - nginx-cache:/var/cache/nginx
    networks:
      - frontend-network
    restart: always

  # React Frontend - used for local development 
  # frontend:
  #   build:
  #     context: ./web-frontend
  #     dockerfile: Dockerfile
  #   # volumes below is used for local development 
  #   # volumes:
  #   #   - ./web-frontend:/app
  #   #   - /app/node_modules
  #   environment:
  #     - NODE_ENV=production
  #   networks:
  #     - frontend-network
  #   restart: always

  # Load Balancer for Backend Servers
  load-balancer:
    image: nginx:alpine
    volumes:
      - ./nginx/load-balancer.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - frontend-network
      - backend-network
    restart: always

  # Backend Server 1
  backend1:
    build:
      context: ./web-backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/app_database
      - PORT=3000
    # volumes below is used for local development 
    # volumes:
    #   - ./web-backend:/app
    #   - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network
      - frontend-network
    restart: always

  # Backend Server 2
  backend2:
    build:
      context: ./web-backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/app_database
      - PORT=3000
    # volumes below is used for local development 
    # volumes:
    #   - ./web-backend:/app
    #   - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network
      - frontend-network
    restart: always

  # Backend Server 3
  backend3:
    build:
      context: ./web-backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/app_database
      - PORT=3000
    # volumes below is used for local development 
    # volumes:
    #   - ./web-backend:/app
    #   - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network
      - frontend-network
    restart: always

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=app_database
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_database"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  frontend-network:
  backend-network:

volumes:
  postgres-data:
  nginx-cache: