user nginx;
# Auto-detect the number of CPU cores and create one worker process per core
# This optimizes performance by utilizing all available CPU resources
worker_processes auto;

# Specify the location and log level for Nginx error logs
# Levels: debug, info, notice, warn, error, crit, alert, emerg
# 'warn' logs only warnings and more severe issues
error_log /var/log/nginx/error.log warn;

# Define where Nginx should store its process ID
# Used by system tools to send signals to the Nginx process
pid /var/run/nginx.pid;

# Configuration block for connection processing settings
events {
    # Maximum number of simultaneous connections each worker process can handle
    # Increase this value for high-traffic websites (if system resources allow)
    worker_connections 1024;
}

http {
    # Include MIME types definitions to properly identify file types for clients
    include /etc/nginx/mime.types;
    # Set default MIME type for files that can't be identified (forces download)
    default_type application/octet-stream;
    
    # Define log format with client IP, timestamp, request details, status code,
    # response size, referrer, user agent, and forwarded IP information
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    # Set the path and format for access logs
    access_log /var/log/nginx/access.log main;
    
    # Enable kernel file system cache for improved I/O performance
    sendfile on;
    # Optimize the sending of data packets (improves network efficiency)
    tcp_nopush on;
    # Disable Nagle's algorithm to reduce latency for interactive applications
    tcp_nodelay on;
    # Set timeout for how long client connections stay open (in seconds)
    keepalive_timeout 65;
    # Configure hash table size for MIME type mappings
    types_hash_max_size 2048;
    
    # Define backend servers
    upstream backend_servers {
        server backend1:8080 max_fails=3 fail_timeout=30s;
        server backend2:8080 max_fails=3 fail_timeout=30s;
        server backend3:8080 max_fails=3 fail_timeout=30s;
        
        # Round-robin is the default load balancing method
        # Other options include:
        # least_conn; # Send to server with fewest active connections
        # ip_hash;    # Keep user sessions on the same server
    }
    
    server {
        listen 80;
        
        location / {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Load balancing improvements
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }
    }
}